catalogMode: strict
cleanupUnusedCatalogs: true

ignoreWorkspaceRootCheck: true
minimumReleaseAgeExclude:
  - '@typescript-eslint/*'
  - '@unocss/*'
  - '@vitest/*'
  - caniuse-lite
  - electron-to-chromium
  - eslint-plugin-jsonc
  - eslint-plugin-perfectionist
  - eslint-plugin-yml
  - unocss
  - vitest

shellEmulator: true

trustPolicy: no-downgrade

allowBuilds:
  esbuild: true
  simple-git-hooks: true

packages:
  - playground
  - docs
  - examples/*

catalogs:
  dev:
    '@antfu/eslint-config': ^9.1.0
    '@antfu/ni': ^30.2.0
    '@types/node': ^26.1.0
    bumpp: ^11.1.0
    eslint: ^10.6.0
    lint-staged: ^17.0.8
    pnpm: ^11.10.0
    simple-git-hooks: ^2.13.1
    tsdown: ^0.22.3
    tsdown-stale-guard: ^0.1.2
    tsnapi: ^1.0.0
    typescript: ^6.0.3
    vitest: ^4.1.10
    vue-tsc: ^3.3.7

  frontend:
    '@iconify-json/carbon': ^1.2.24
    '@vitejs/plugin-vue': ^6.0.7
    monaco-editor: ^0.55.1
    splitpanes: ^4.1.2
    unplugin-auto-import: ^21.0.0
    vite: ^8.1.3
    vue: ^3.5.39

  inlined:
    '@unocss/autocomplete': ^66.7.5
    '@unocss/core': ^66.7.5
    '@unocss/reset': ^66.7.5
    '@unocss/transformer-variant-group': ^66.7.5
    unocss: ^66.7.5

  prod:
    '@colordx/core': ^5.5.0
    '@ctrl/tinycolor': ^4.2.0
    magic-string: ^1.0.0
    monaco-languageserver-types: ^0.4.1
    monaco-types: ^0.1.2
    prettier: ^3.9.5
    vscode-languageserver-protocol: ^3.18.2
    vscode-languageserver-textdocument: ^1.0.12
